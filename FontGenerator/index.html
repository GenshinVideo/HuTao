<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <title>Honey Apricot - Font Generator</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="assets/js/html2canvas.min.js"></script>
</head>

<body>
  <div class="SakuraWallpaper">
    <video src="movie.mp4" loop autoplay muted playsinline></video>
  </div>
  <div class="Contents">

    <div class="controls">
      <textarea id="textInput" placeholder="Enter alphabet"></textarea>
      <select id="fontSelect">
        <option value="FirstWorld">ヤリーロ-VI</option>
        <option value="SecondWorld">仙舟「羅浮」</option>
        <option value="ThirdWorld">ピノコニー</option>
        <option value="FourthWorld">オンパロス</option>
        <option value="FifthWorld">二相楽園</option>
      </select>
      <button id="saveBtn">保存</button>
    </div>
    <div id="output"></div>

  </div>
  <script src="assets/js/main.js"></script>
</body>
</html>
